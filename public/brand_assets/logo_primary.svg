<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <!-- Style Definitions for Fonts and Smooth Rendering -->
  <style>
    .gold-stroke { stroke: #C9A86A; stroke-width: 1.2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .gold-fill { fill: #C9A86A; }
    .charcoal-fill { fill: #2D2A26; }
    .grey-fill { fill: #6B675F; }
    .serif-text { font-family: 'Cormorant Garamond', 'Playfair Display', 'Didot', serif; }
    .sans-text { font-family: 'Inter', 'Manrope', sans-serif; }
  </style>

  <!-- ICON CONTAINER (Top Half) -->
  <g id="logo-mark" transform="translate(0, 10)">
    <!-- Slanted Roof House Outline (Fine Gold Line) -->
    <path d="M 180,260 L 180,145 L 250,85 L 320,145 L 320,260" class="gold-stroke" />

    <!-- Inner Elegant Archway -->
    <path d="M 200,260 L 200,165 A 50,50 0 0,1 300,165 L 300,260" class="gold-stroke" />

    <!-- Minimal Pendant Lamp hanging from roof -->
    <line x1="312" y1="138" x2="312" y2="195" class="gold-stroke" />
    <path d="M 306,195 A 6,6 0 0,0 318,195 Z" class="gold-fill" />

    <!-- Console Table Detail -->
    <path d="M 290,230 L 330,230 M 295,230 L 295,260 M 325,230 L 325,260" class="gold-stroke" />
    
    <!-- Flower Vase on Table -->
    <circle cx="317" cy="225" r="3" class="gold-fill" />
    <!-- Delicate botanic stems -->
    <path d="M 317,222 C 315,215 310,212 308,210 M 317,222 C 318,214 322,211 325,209 M 317,222 C 317,212 316,208 315,205" class="gold-stroke" />

    <!-- Interlocking Monogram "DA" -->
    <!-- Letter D (Slightly left and higher) -->
    <text x="190" y="235" class="charcoal-fill serif-text" font-size="95" font-weight="300" letter-spacing="-2">D</text>
    <!-- Letter A (Slightly right, lower, and overlaps D) -->
    <text x="225" y="250" class="charcoal-fill serif-text" font-size="95" font-weight="300" letter-spacing="-2">A</text>
  </g>

  <!-- WORDMARK & TYPOGRAPHY (Bottom Half) -->
  <g id="typography">
    <!-- "THE" with flanking thin horizontal lines -->
    <line x1="120" y1="335" x2="210" y2="335" class="gold-stroke" />
    <text x="250" y="340" class="grey-fill sans-text" font-size="14" font-weight="400" letter-spacing="10" text-anchor="middle">THE</text>
    <line x1="290" y1="335" x2="380" y2="335" class="gold-stroke" />

    <!-- Primary Brand Name "DESIGN ATELIER" -->
    <text x="250" y="395" class="charcoal-fill serif-text" font-size="40" font-weight="400" letter-spacing="4" text-anchor="middle">DESIGN ATELIER</text>

    <!-- Subtitle "INTERIOR DESIGN STUDIO" -->
    <text x="250" y="430" class="gold-fill sans-text" font-size="11" font-weight="500" letter-spacing="8" text-anchor="middle">INTERIOR DESIGN STUDIO</text>

    <!-- Lower Accent Detail (Diamond / Star) -->
    <line x1="200" y1="460" x2="235" y2="460" class="gold-stroke" />
    <path d="M 250,454 L 253,459 L 258,461 L 253,463 L 250,468 L 247,463 L 242,461 L 247,459 Z" class="gold-fill" />
    <line x1="265" y1="460" x2="300" y2="460" class="gold-stroke" />
  </g>
</svg>
