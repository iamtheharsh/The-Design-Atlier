<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="100%" height="100%">
  <!-- Style Definitions for Favicon (Thicker lines for readability at 16x16 / 32x32) -->
  <style>
    .gold-stroke-fav { stroke: #C9A86A; stroke-width: 2.2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .charcoal-fill-fav { fill: #2D2A26; }
    .serif-text-fav { font-family: 'Cormorant Garamond', 'Playfair Display', serif; font-weight: 500; }
  </style>

  <!-- High-Readability Favicon Archway -->
  <path d="M 6,29 L 6,15 A 10,10 0 0,1 26,15 L 26,29" class="gold-stroke-fav" />

  <!-- High-Readability Monogram "DA" (slightly adjusted and boldened for small scale) -->
  <text x="5" y="25" class="charcoal-fill-fav serif-text-fav" font-size="17" letter-spacing="-1.5">D</text>
  <text x="14" y="27" class="charcoal-fill-fav serif-text-fav" font-size="17" letter-spacing="-1.5">A</text>
</svg>
