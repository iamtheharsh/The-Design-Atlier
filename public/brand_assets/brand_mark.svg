<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 40" width="100%" height="100%">
  <!-- Style Definitions for Brand Mark -->
  <style>
    .gold-stroke-mark { stroke: #C9A86A; stroke-width: 1.0; fill: none; stroke-linecap: round; }
    .gold-fill-mark { fill: #C9A86A; }
  </style>

  <!-- Horizontal flanking lines -->
  <line x1="5" y1="20" x2="40" y2="20" class="gold-stroke-mark" />
  <line x1="60" y1="20" x2="95" y2="20" class="gold-stroke-mark" />

  <!-- Refined Four-Point Star / Diamond Badge in the center -->
  <path d="M 50,11 L 53.5,17.5 L 60,20 L 53.5,22.5 L 50,29 L 46.5,22.5 L 40,20 L 46.5,17.5 Z" class="gold-fill-mark" />
</svg>
