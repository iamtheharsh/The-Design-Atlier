<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Style Definitions for Fonts and Smooth Rendering -->
  <style>
    .gold-stroke { stroke: #C9A86A; stroke-width: 1.2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .gold-fill { fill: #C9A86A; }
    .charcoal-fill { fill: #2D2A26; }
    .serif-text { font-family: 'Cormorant Garamond', 'Playfair Display', 'Didot', serif; }
  </style>

  <!-- ICON CONTAINER (Centered in 200x200 ViewBox) -->
  <g id="logo-monogram" transform="translate(15, 10)">
    <!-- House Outline (Gold) -->
    <path d="M 50,155 L 50,75 L 85,40 L 120,75 L 120,155" class="gold-stroke" />

    <!-- Inner Elegant Archway -->
    <path d="M 62,155 L 62,88 A 23,23 0 0,1 108,88 L 108,155" class="gold-stroke" />

    <!-- Hanging Lamp -->
    <line x1="113" y1="71" x2="113" y2="105" class="gold-stroke" />
    <path d="M 109,105 A 4,4 0 0,0 117,105 Z" class="gold-fill" />

    <!-- Console Table Detail -->
    <path d="M 102,130 L 126,130 M 105,130 L 105,155 M 123,130 L 123,155" class="gold-stroke" />
    <circle cx="118" cy="126" r="2" class="gold-fill" />
    <path d="M 118,124 C 116,118 114,115 112,113 M 118,124 C 119,118 122,115 124,113" class="gold-stroke" />

    <!-- Monogram DA -->
    <text x="56" y="138" class="charcoal-fill serif-text" font-size="54" font-weight="300" letter-spacing="-2">D</text>
    <text x="76" y="147" class="charcoal-fill serif-text" font-size="54" font-weight="300" letter-spacing="-2">A</text>
  </g>
</svg>
